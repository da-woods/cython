name: CI

on:
  push:
    paths:
      - '**'
      - '!Demos/benchmarks/**'
      - '!.github/**'
      - '.github/workflows/ci.yml'
      - '**/*.md'
      - '**/*.rst'
      - '!docs/**'
      - 'docs/examples/**'
  pull_request:
    paths:
      - '**'
      - '!Demos/benchmarks/**'
      - '!.github/**'
      - '.github/workflows/ci.yml'
      - '!**/*.md'
      - '!**/*.rst'
      - '!docs/**'
      - 'docs/examples/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read # to fetch code (actions/checkout)

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  GCC_VERSION: 10
  USE_CCACHE: 1
  CCACHE_SLOPPINESS: "pch_defines,time_macros"
  CCACHE_COMPRESS: 1
  CCACHE_COMPRESSLEVEL: 5
  # Size guide: 10GB maximum cache storage / total number of CI jobs creating a cache.
  # However, a single run currently generates 170-210 MB, so less would use less but be useless.
  CCACHE_MAXSIZE: "220M"


jobs:

  ci-early:
    strategy:
      # Allows for matrix sub-jobs to fail without canceling the rest
      fail-fast: false

      matrix:
        os: [ubuntu-22.04]
        backend: [c]
        python-version: ["3.14"]

        include:
          # GraalPy
          - os: ubuntu-22.04
            python-version: graalpy25
            backend: c
            no_cython_compile: 1

    uses: ./.github/workflows/ci-job.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      backend: ${{ matrix.backend }}
      limited_api: ${{ matrix.limited_api }}
      shared_utility: ${{ matrix.shared_utility }}
      extra_hash: ${{ matrix.extra_hash }}


  ci-all:
    needs: [codespell, codestyle, ci-early, build_docs]

    strategy:
      # Allows for matrix sub-jobs to fail without canceling the rest
      fail-fast: false

      # MATRIX:
      # =======
      # Required parameters:
      #  os                  the os to run on
      #  python-version      the python version to use
      #  backend             the backend to use
      # Optional parameters:
      #  limited_api         extra flags related to the limited api
      #  shared_utility      extra flags relating to the shared utility
      #  gcc_version
      #  extra_cflags
      #  cython_compile_all  '1' to build cython with "compile all"
      #  no_cython_compile   '1' to not compile cython itself
      #  extra_hash          extra hash str to differentiate from other caches with similar name (must always start with '-')
      matrix:
        # Tests [amd64]
        #
        os: [ubuntu-22.04]
        backend: [c]
        python-version:
          - "3.13"

    uses: ./.github/workflows/ci-job.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      backend: ${{ matrix.backend }}
      extra_hash: ${{ matrix.extra_hash }}


  ci-success:
    needs: ci-all
    if: success()
    runs-on: ubuntu-latest
    steps:
      - run: true


  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Codespell
        uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2.2


  codestyle:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHON_VERSION: "3.13"
      BACKEND: "c,cpp"
      TEST_CODE_STYLE: "1"
      NO_CYTHON_COMPILE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run codestyle
        run: |
          bash -c "\
            python -m pip install --no-cache-dir -U pip || exit 1 ; \
            python -m pip install --no-cache-dir -r test-requirements.txt || exit 1 ; \
            python runcodestyle.py \
              2> >(tee >(egrep '.+:[0-9]+: ' | sed -e 's/^/    /' >> $GITHUB_STEP_SUMMARY) >&2) \
            "

  build_docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHON_VERSION: "3.13"
      BACKEND: "c,cpp"
      TEST_CODE_STYLE: "1"
      NO_CYTHON_COMPILE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build HTML docs
        run: |
          python -m pip install --no-cache-dir -r doc-requirements.txt
          make -C docs html

      - name: Upload HTML docs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: htmldocs
          path: docs/build/html
          if-no-files-found: ignore
